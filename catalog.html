<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <title>HTML Academy: Седона</title>
</head>

<body>
  <header class="page-header" data-test="header">
    <nav class="navigation">
      <a class="navigation-logo" href="index.html" aria-current="page">
        <img class="page-header-logo" src="#" alt="Логотип города Седона">
      </a>
      <ul class="navigation-list">
        <li class="navigation-item">
          <a class="navigation-link navigation-link-current" href="index.html">Главная</a>
        </li>
        <li class="navigation-item">
          <a class="navigation-link" href="#">О Седоне</a>
        </li>
        <li class="navigation-item">
          <a class="navigation-link" href="#">Гостиницы</a>
        </li>
      </ul>
      <ul>
        <li class="navigation-user">
          <a class="navigation-user-link navigation-user-link-search" href="#">
            <span class="visually-hidden">Поиск</span>
          </a>
        </li>
        <li class="navigation-user">
          <a class="navigation-user-link navigation-user-link-favorite" href="#">
            <span class="visually-hidden">Избранное 12 отелей</span>
          </a>
        </li>
        <li class="navigation-user">
          <a class="button button-all" href="#">Хочу сюда!</a>
        </li>
      </ul>
    </nav>
  </header>
  <main>
    <h1>Гостиницы Седоны</h1>
    <section>
      <form method="get" action="https://echo.htmlacademy.ru">
        <fieldset>
          <legend>Инфраструктура</legend>
          <ul>
            <li>
              <input type="checkbox" name="swimming-pool" id="filter-swimming-pool" checked>
              <label for="filter-swimming-pool">Бассейн</label>
            </li>
            <li>
              <input type="checkbox" name="parking" id="filter-parking" checked>
              <label for="filter-parking">Парковка</label>
            </li>
            <li>
              <input type="checkbox" name="wi-fi" id="filter-wi-fi">
              <label for="filter-wi-fi">Wi-Fi</label>
            </li>
          </ul>
        </fieldset>
        <fieldset>
          <legend>Тип Жилья</legend>
          <ul>
            <li>
              <input type="radio" name="hotel" id="filter-shave-hotel" checked>
              <label for="filter-shave-hotel">Гостиница</label>
            </li>
            <li>
              <input type="radio" name="motel" id="filter-shave-motel">
              <label for="filter-shave-motel">Мотель</label>
            </li>
            <li>
              <input type="radio" name="apartment" id="filter-shave-apartment">
              <label for="filter-shave-apartment">Апартаменты</label>
            </li>
          </ul>
        </fieldset>
      </form>
      <fieldset>
        <legend>Стоимость, ₽:</legend>
        <input type="range" min="0" max="9000" step="1" value="7000">
      </fieldset>
      <button type="submit">Применить</button>
      <p>
        <button type="submit">Сбросить</button>
      </p>
      <h2>Найдено гостиниц: 38</h2>
      <form class="sorting_form">
        <select name="sorting" class="sorting_select">
          <option value="ASC" selected>Сначала дешёвые</option>
          <option value="DESC">Сначала дорогие</option>
        </select>
      </form>
    </section>
    <ul>
      <li>
        <img src="#" alt="Отель Amara Resort & Spa">
        <h3>Amara Resort & Spa</h3>
        <p>Гостиница От 4000 ₽
        </p>
        <button type="button">ПОДРОБНЕЕ</button>
        <button type="button">В ИЗБРАННОЕ</button>
  </main>
